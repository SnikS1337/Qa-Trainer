<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QA Trainer — Школа тестировщика</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        background: #0f111a;
        color: #fff;
      }

      .boot-splash {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        box-sizing: border-box;
        text-align: center;
        font-family:
          'Bricolage Grotesque',
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
      }

      .boot-splash__card {
        width: 100%;
        max-width: 360px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(8px);
        padding: 28px 22px;
      }

      .boot-splash__icon {
        font-size: 48px;
        line-height: 1;
        margin-bottom: 12px;
      }

      .boot-splash__title {
        font-size: 34px;
        font-weight: 800;
        line-height: 1.05;
        margin: 0;
      }

      .boot-splash__title-accent {
        color: #34d399;
      }

      .boot-splash__hint {
        margin-top: 10px;
        font-size: 13px;
        color: #cbd5e1;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-splash" aria-hidden="true">
        <div class="boot-splash__card">
          <div class="boot-splash__icon">🧪</div>
          <h1 class="boot-splash__title">
            QA<br />
            <span class="boot-splash__title-accent">Trainer</span>
          </h1>
          <div class="boot-splash__hint">Загружаем приложение...</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
